<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16234a"/>
      <stop offset="60%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#080d16"/>
    </radialGradient>
    <linearGradient id="loop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d6c0"/>
      <stop offset="100%" stop-color="#8a93ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- full-bleed background (safe for maskable icons) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- the loop: an almost-closed ring, round caps, gap toward the top -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="132" fill="none" stroke="url(#loop)"
            stroke-width="34" stroke-linecap="round"
            stroke-dasharray="700 129" transform="rotate(-108 256 256)"/>
  </g>

  <!-- three pillars: Build / Code / Control -->
  <circle cx="212" cy="256" r="15" fill="#ffb454"/>
  <circle cx="256" cy="256" r="19" fill="#8a93ff"/>
  <circle cx="300" cy="256" r="15" fill="#34d6c0"/>
</svg>
