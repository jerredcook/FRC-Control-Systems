<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FRC Academy · Certificate of Completion</title>
<style>
  :root{
    --ink:#0E1525; --panel:#161E30; --panel-2:#1B2540; --line:#26324A; --line-2:#33415e;
    --text:#E7ECF6; --muted:#92A2BE; --faint:#5E6F8E;
    --amber:#FFB020; --teal:#34D7C5; --indigo:#8E8CF8; --green:#43D67E;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--ink); color:var(--text);
    font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(900px 500px at 80% -10%, rgba(255,176,32,.06), transparent 60%),
      radial-gradient(700px 500px at -10% 10%, rgba(52,215,197,.05), transparent 55%);
  }
  .wrap{max-width:900px;margin:0 auto;padding:0 22px}
  header.top{border-bottom:1px solid var(--line);background:rgba(14,21,37,0.6);backdrop-filter:blur(6px)}
  .top-inner{max-width:900px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal)}
  .brand .name{font-family:var(--mono);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
  .top-meta{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}

  /* course selector */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 2px}
  .tab{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--panel-2);border:1px solid var(--line-2);border-radius:20px;padding:8px 14px;cursor:pointer;transition:.12s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text);border-color:var(--sel,var(--teal));box-shadow:0 0 0 2px color-mix(in srgb, var(--sel,var(--teal)) 22%, transparent)}

  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:16px 0 6px}
  .namebox{flex:1 1 280px;display:flex;flex-direction:column;gap:6px}
  .namebox label{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .namebox input{font-family:var(--sans);font-size:17px;background:var(--panel-2);border:1px solid var(--line-2);color:var(--text);border-radius:9px;padding:11px 14px;outline:none}
  .namebox input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(255,176,32,.18)}
  .btn{border:1px solid var(--line-2);background:var(--panel-2);color:var(--muted);font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;padding:12px 16px;border-radius:9px;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--teal);color:var(--text)}
  .btn.primary{background:linear-gradient(180deg,#6FF0DD,var(--teal));color:#06121f;font-weight:700;border:none}
  .progress{font-family:var(--mono);font-size:12px;color:var(--muted);margin:6px 0 0;line-height:1.7}
  .progress b{color:var(--teal)}

  /* the certificate */
  .cert-stage{padding:8px 0 30px}
  .cert{
    --cert:var(--teal);
    position:relative;border:2px solid var(--cert);border-radius:16px;
    background:linear-gradient(180deg,#0f1830,#0b1322);
    padding:48px 44px;text-align:center;overflow:hidden;
    box-shadow:0 30px 80px -40px rgba(0,0,0,0.9);
  }
  .cert::before{content:"";position:absolute;inset:10px;border:1px solid var(--line-2);border-radius:10px;pointer-events:none}
  .cert .seal{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--amber)}
  .cert .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cert);box-shadow:0 0 12px var(--cert);margin-bottom:14px}
  .cert h1{font-size:clamp(1.8rem,4.5vw,2.8rem);margin:6px 0 2px;letter-spacing:-.02em;font-weight:850}
  .cert h1 .accent{background:linear-gradient(90deg,var(--teal),var(--indigo));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cert .sub{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:26px}
  .cert .awarded{font-size:14px;color:var(--muted);letter-spacing:.04em}
  .cert .who{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;margin:8px 0 6px;color:var(--text);border-bottom:1px solid var(--line-2);display:inline-block;padding:0 20px 8px;min-width:280px}
  .cert .for{font-size:15px;color:var(--muted);max-width:52ch;margin:14px auto 0}
  .cert .parts{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:22px auto 0;max-width:660px}
  .cert .pchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--cert);border:1px solid var(--line-2);border-radius:20px;padding:6px 12px}
  .cert .foot{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-top:34px;flex-wrap:wrap}
  .cert .sig{flex:1 1 200px;text-align:left}
  .cert .sig .line{border-top:1px solid var(--line-2);padding-top:6px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .cert .sig .nm{font-size:15px;color:var(--text);font-style:italic;margin-bottom:6px}
  .cert .date{flex:1 1 160px;text-align:right}
  .cert .date .d{font-size:15px;color:var(--text)}

  .backlink{display:inline-block;margin:8px 0 0;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--indigo);text-decoration:none;border:1px solid var(--line-2);border-radius:9px;padding:10px 13px}
  .backlink:hover{border-color:var(--teal);color:var(--text)}
  footer{padding:24px 0 60px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase}

  @media print{
    @page{size:landscape;margin:0.5in}
    body{background:#fff;color:#111;background-image:none}
    header.top,.controls,.tabs,.progress,.backlink,footer,.no-print{display:none !important}
    .cert{border-color:#0a8;background:#fff;box-shadow:none}
    .cert::before{border-color:#bbb}
    .cert h1,.cert .who,.cert .date .d{color:#111}
    .cert h1 .accent{-webkit-text-fill-color:#067;color:#067}
    .cert .sub,.cert .awarded,.cert .for,.cert .sig .line{color:#444}
    .cert .seal{color:#a06b00}
    .cert .pchip{color:#067;border-color:#bbb}
    .cert .who{border-color:#999}
    .cert .sig .nm{color:#111}
  }
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <a class="brand" href="index.html"><span class="dot"></span><span class="name">FRC Academy</span></a>
    <div class="top-meta">Certificate</div>
  </div>
</header>

<div class="wrap">

  <div class="tabs no-print" id="tabs">
    <button class="tab" data-course="control">🎯 Control</button>
    <button class="tab" data-course="deploy">🎮 Code</button>
    <button class="tab" data-course="build">🔧 Build</button>
    <button class="tab" data-course="academy">🏅 Academy</button>
  </div>

  <div class="controls no-print">
    <div class="namebox">
      <label>Your name (appears on the certificate)</label>
      <input id="name" type="text" placeholder="Type your name…" autocomplete="off" />
    </div>
    <button class="btn primary" id="print">⎙ Print / Save PDF</button>
  </div>
  <div class="progress no-print" id="progress"></div>

  <div class="cert-stage">
    <div class="cert" id="cert">
      <span class="dot"></span>
      <div class="seal" id="seal">Closing the Loop</div>
      <h1>Certificate of <span class="accent">Completion</span></h1>
      <div class="sub" id="sub">A control systems course for FRC</div>
      <div class="awarded">This certifies that</div>
      <div class="who" id="who">Your Name</div>
      <div class="for" id="for"></div>
      <div class="parts" id="parts"></div>
      <div class="foot">
        <div class="sig">
          <div class="nm" id="signm">Closing the Loop</div>
          <div class="line">Course</div>
        </div>
        <div class="date">
          <div class="d" id="date">-</div>
          <div class="line" style="border-top:1px solid var(--line-2);padding-top:6px;text-align:right">Date completed</div>
        </div>
      </div>
    </div>
  </div>

  <a class="backlink no-print" id="backlink" href="index.html">← Back to the academy</a>
</div>

<footer>FRC Academy · Build · Code · Control</footer>

<script>
(function(){
  "use strict";

  var COURSES={
    control:{
      seal:"Closing the Loop", sub:"A control systems course for FRC",
      accent:"#34D7C5", hub:"closing-the-loop.html", key:"closing-the-loop:done", total:24,
      lessonRe:/^closing-the-loop-lesson-\d+(-py)?\.html$/,
      forText:"has completed all 24 lessons - from feedback fundamentals through PID, feedforward, real WPILib code, CTRE Phoenix 6, tuned mechanisms, and state-space control.",
      parts:["I · The Idea","II · From Math to Code","III · CTRE Phoenix 6","IV · Tune a Real Mechanism","V · Beyond"]
    },
    deploy:{
      seal:"Deploy", sub:"Programming an FRC robot",
      accent:"#8E8CF8", hub:"code.html", key:"deploy:done", total:37,
      lessonRe:/^deploy-lesson-\d+(-py)?\.html$/,
      forText:"has completed all 37 lessons - from the toolchain and just-enough Java through command-based robots, hardware, driving and autonomous, vision, pro practices, and a real-robot capstone.",
      parts:["1 · Toolchain","2 · Just-Enough Java","3 · Command-Based","4 · Talking to Hardware","5 · Make It Move","6 · Driving & Autonomous","7 · Seeing & Thinking","8 · Pro Practices","9 · Capstone"]
    },
    build:{
      seal:"Fabricate", sub:"Building an FRC robot",
      accent:"#FFB020", hub:"build.html", key:"build:done", total:44,
      lessonRe:/^build-lesson-\d+\.html$/,
      forText:"has completed all 44 lessons - from shop safety and materials through power transmission, mechanisms, drivetrains, electrical and pneumatics, design and CAD, and a full build season.",
      parts:["1 · The Shop","2 · Materials & Stock","3 · Power Transmission","4 · Mechanisms","5 · The Drivetrain","6 · Electrical & Pneumatics","7 · Design & CAD","8 · Build Season"]
    },
    academy:{
      seal:"FRC Academy", sub:"Build · Code · Control",
      accent:"#6FE0D8", hub:"index.html",
      forText:"has completed all three courses of the FRC Academy - Fabricate, Deploy, and Closing the Loop - every one of the 105 lessons that turn a beginner into someone who can build, code, and control an FRC robot.",
      parts:[{t:"🔧 Fabricate · 44",c:"#FFB020"},{t:"🎮 Deploy · 37",c:"#8E8CF8"},{t:"🎯 Closing the Loop · 24",c:"#34D7C5"}]
    }
  };
  var GRAND=24+37+44;

  var nameEl=document.getElementById("name"), whoEl=document.getElementById("who");
  var dateEl=document.getElementById("date"), progEl=document.getElementById("progress");
  var certEl=document.getElementById("cert"), sealEl=document.getElementById("seal");
  var subEl=document.getElementById("sub"), forEl=document.getElementById("for");
  var partsEl=document.getElementById("parts"), signmEl=document.getElementById("signm");
  var backEl=document.getElementById("backlink"), tabsEl=document.getElementById("tabs");

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // count distinct completed lessons for a course: match only its lesson files
  // (excludes checkpoints and other keys), and treat a -py twin as its Java lesson.
  function countDone(c){
    var o={}; try{ o=JSON.parse(localStorage.getItem(c.key))||{}; }catch(e){}
    var seen={};
    Object.keys(o).forEach(function(k){
      if(!o[k] || !c.lessonRe.test(k)) return;
      seen[k.replace(/-py\.html$/,".html")]=true;
    });
    return Math.min(Object.keys(seen).length, c.total);
  }

  function chipHTML(p){
    if(typeof p==="string") return '<span class="pchip">'+esc(p)+'</span>';
    return '<span class="pchip" style="color:'+p.c+';border-color:'+p.c+'55">'+esc(p.t)+'</span>';
  }

  function progressText(courseKey){
    if(courseKey==="academy"){
      var cc=countDone(COURSES.control), dc=countDone(COURSES.deploy), bc=countDone(COURSES.build);
      var tot=cc+dc+bc;
      var mini='🔧 Fabricate '+bc+'/44 &nbsp;·&nbsp; 🎮 Deploy '+dc+'/37 &nbsp;·&nbsp; 🎯 Control '+cc+'/24';
      if(cc>=24 && dc>=37 && bc>=44)
        return '<b>✓ All three courses complete - '+GRAND+' lessons.</b> You have finished the entire academy. Print it and hang it up.<br>'+mini;
      return 'Academy progress: <b>'+tot+' / '+GRAND+'</b> lessons.<br>'+mini;
    }
    var c=COURSES[courseKey], n=countDone(c);
    if(n>=c.total) return '<b>✓ All '+c.total+' lessons complete.</b> Print it and hang it up.';
    return 'You’ve marked <b>'+n+' / '+c.total+'</b> lessons complete. The certificate is yours to print whenever you finish - keep going!';
  }

  var current="control";
  function render(courseKey){
    current=courseKey;
    var c=COURSES[courseKey];
    certEl.style.setProperty("--cert", c.accent);
    tabsEl.style.setProperty("--sel", c.accent);
    sealEl.textContent=c.seal;
    subEl.textContent=c.sub;
    forEl.textContent=c.forText;
    signmEl.textContent=c.seal;
    partsEl.innerHTML=c.parts.map(chipHTML).join("");
    backEl.setAttribute("href", c.hub);
    backEl.textContent = courseKey==="academy" ? "← Back to the academy" : "← Back to the course map";
    progEl.innerHTML=progressText(courseKey);
    Array.prototype.forEach.call(tabsEl.querySelectorAll(".tab"), function(t){
      t.classList.toggle("active", t.getAttribute("data-course")===courseKey);
    });
  }

  // pick the most relevant tab to open on: all three done -> academy;
  // otherwise the course the student is furthest along in.
  function defaultCourse(){
    var keys=["control","deploy","build"];
    if(keys.every(function(k){ return countDone(COURSES[k])>=COURSES[k].total; })) return "academy";
    var best="control", bestRatio=-1;
    keys.forEach(function(k){
      var r=countDone(COURSES[k])/COURSES[k].total;
      if(r>bestRatio){ bestRatio=r; best=k; }
    });
    return best;
  }

  // name (persisted, shared across all course certificates)
  var saved="";
  try{ saved=localStorage.getItem("frc:name")||localStorage.getItem("closing-the-loop:name")||""; }catch(e){}
  if(saved){ nameEl.value=saved; whoEl.textContent=saved; }
  nameEl.addEventListener("input",function(){
    var v=nameEl.value.trim();
    whoEl.textContent=v||"Your Name";
    try{ localStorage.setItem("frc:name", v); }catch(e){}
  });

  // date - today, formatted
  try{
    var d=new Date();
    dateEl.textContent=d.toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"});
  }catch(e){ dateEl.textContent=""; }

  tabsEl.addEventListener("click",function(e){
    var t=e.target.closest(".tab"); if(!t) return;
    render(t.getAttribute("data-course"));
  });

  document.getElementById("print").addEventListener("click",function(){
    if(!nameEl.value.trim()){ nameEl.focus(); return; }
    window.print();
  });

  // re-render if progress syncs in from an account
  window.addEventListener("frc:progresssynced", function(){ try{ render(current); }catch(e){} });

  render(defaultCourse());
})();
</script>
<script src="account-config.js"></script>
<script src="account.js"></script>
</body>
</html>
