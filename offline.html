<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline · FRC Academy</title>
<style>
  :root{ --bg:#090d15; --panel:#0f1626; --line:#1e2840; --ink:#e8edf7; --ink-dim:#aeb9d1; --muted:#75829e; --teal:#34d6c0;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(900px 500px at 70% -10%,rgba(52,214,192,.06),transparent 60%),linear-gradient(180deg,#0b1019,var(--bg));
    color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  .card{max-width:440px;text-align:center;border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:38px 30px}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--teal);box-shadow:0 0 16px var(--teal);margin:0 auto 18px}
  h1{font-size:24px;margin:0 0 8px;letter-spacing:-.02em}
  p{color:var(--ink-dim);margin:0 0 22px}
  a{display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);
    text-decoration:none;border:1px solid var(--line);border-radius:10px;padding:12px 16px}
  a:hover{border-color:var(--teal)}
  .hint{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:18px;letter-spacing:.04em}
</style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1>You're offline</h1>
    <p>This page hasn't been saved for offline use yet. Pages you have already opened still work with no connection.</p>
    <a href="index.html">Go to the academy home</a>
    <div class="hint">Reconnect and open a lesson once to keep it available offline.</div>
  </div>
</body>
</html>
